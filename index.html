<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selección de Menús — SH Gestión</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f8; color: #1a2332; min-height: 100vh; padding: 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .card {
    background: #fff; border-radius: 12px; padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px;
  }
  h1 { font-size: 1.5rem; color: #0a4d8c; margin-bottom: 4px; }
  h2 { font-size: 1.1rem; margin-bottom: 12px; color: #1a2332; }
  .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 16px; }
  .logo { font-weight: 700; color: #0a4d8c; font-size: 1.1rem; margin-bottom: 4px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
  input[type="text"], input[type="password"], select {
    width: 100%; padding: 12px; border: 1px solid #cbd5e1;
    border-radius: 8px; font-size: 1rem; margin-bottom: 12px; background: #fff;
  }
  input:focus, select:focus { outline: none; border-color: #0a4d8c; }
  button {
    background: #0a4d8c; color: #fff; border: none; padding: 12px 20px;
    border-radius: 8px; font-size: 1rem; font-weight: 600;
    cursor: pointer; width: 100%;
  }
  button:hover { background: #083a6b; }
  button:disabled { background: #94a3b8; cursor: not-allowed; }
  button.btn-secundario { background: #e2e8f0; color: #1a2332; }
  button.btn-secundario:hover { background: #cbd5e1; }
  button.btn-rojo { background: #b91c1c; }
  button.btn-rojo:hover { background: #991b1b; }
  button.btn-pequeno { padding: 8px 14px; font-size: 0.85rem; width: auto; }

  /* Día - estados */
  .dia-card {
    border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px;
    margin-bottom: 12px; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: all 0.2s;
  }
  .dia-card.guardado {
    border-color: #10b981; background: #f0fdf4;
  }
  .dia-card.cancelado {
    border-color: #cbd5e1; background: #f1f5f9;
  }
  .dia-card.bloqueado {
    opacity: 0.6;
  }

  .dia-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .dia-fecha-cont { display: flex; align-items: center; gap: 8px; }
  .dia-fecha { font-weight: 700; color: #0a4d8c; font-size: 1rem; }
  .dia-card.guardado .dia-fecha { color: #065f46; }
  .dia-card.cancelado .dia-fecha { color: #475569; text-decoration: line-through; }
  .dia-nombre { color: #64748b; font-size: 0.85rem; margin-left: 8px; }
  .estado-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; color: #fff;
  }
  .estado-icon.ok { background: #10b981; }
  .estado-icon.x { background: #94a3b8; }

  /* Alternativas */
  .alt-opcion {
    display: flex; align-items: flex-start; padding: 10px;
    border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.15s; background: #fff;
  }
  .alt-opcion:hover { border-color: #0a4d8c; background: #f8fafc; }
  .alt-opcion.seleccionada { border-color: #0a4d8c; background: #e6f0fa; }
  .alt-radio {
    width: 22px; height: 22px; border: 2px solid #cbd5e1; border-radius: 50%;
    margin-right: 10px; flex-shrink: 0; position: relative; margin-top: 2px;
  }
  .alt-opcion.seleccionada .alt-radio { border-color: #0a4d8c; }
  .alt-opcion.seleccionada .alt-radio::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 12px; height: 12px; background: #0a4d8c; border-radius: 50%;
  }
  .alt-info { flex: 1; }
  .alt-codigo {
    display: inline-block; font-size: 0.7rem; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; margin-right: 6px;
  }
  .alt-A { background: #fef3c7; color: #92400e; }
  .alt-B { background: #dbeafe; color: #1e40af; }
  .alt-C { background: #d1fae5; color: #065f46; }
  .alt-desc { font-size: 0.95rem; color: #1a2332; margin-top: 4px; }

  /* Vista colapsada (guardado o cancelado) */
  .vista-colapsada {
    padding: 8px 4px;
  }
  .vista-colapsada .alt-codigo { margin-bottom: 6px; }
  .vista-colapsada .alt-desc { font-size: 1rem; font-weight: 500; }
  .motivo-cancelacion {
    color: #475569; font-size: 0.9rem; margin-top: 4px;
  }
  .motivo-cancelacion strong { color: #1e293b; }

  /* Botones de acción dentro del día */
  .dia-acciones {
    display: flex; gap: 8px; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid #e2e8f0;
  }
  .dia-card.cancelado .dia-acciones { border-top-color: #cbd5e1; }

  /* Mensajes */
  .mensaje { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 0.9rem; }
  .error { background: #fee2e2; color: #991b1b; }
  .ok { background: #d1fae5; color: #065f46; }
  .info { background: #dbeafe; color: #1e40af; }

  /* Resumen */
  .resumen {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    font-size: 0.85rem;
    text-align: center;
  }
  .resumen-item { padding: 8px; background: #f1f5f9; border-radius: 6px; }
  .resumen-item .num { font-size: 1.4rem; font-weight: 700; display: block; }
  .resumen-item.elegidos .num { color: #10b981; }
  .resumen-item.cancelados .num { color: #b91c1c; }
  .resumen-item.faltan .num { color: #f59e0b; }

  /* Header */
  .header-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 12px; border-bottom: 1px solid #e2e8f0; margin-bottom: 16px;
  }
  .user-info { font-size: 0.85rem; color: #64748b; }

  /* Loader */
  .loader {
    display: inline-block; width: 20px; height: 20px;
    border: 3px solid #e2e8f0; border-top-color: #0a4d8c;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Badge cerrado */
  .bloqueado-badge {
    display: inline-block; font-size: 0.7rem; padding: 2px 6px;
    background: #fee2e2; color: #991b1b; border-radius: 4px;
    margin-left: 6px; font-weight: 700;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
  }
  .modal {
    background: #fff; border-radius: 12px; padding: 24px;
    max-width: 420px; width: 100%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .modal h3 {
    color: #0a4d8c; font-size: 1.2rem; margin-bottom: 8px;
  }
  .modal p { color: #64748b; font-size: 0.9rem; margin-bottom: 16px; }
  .modal-acciones {
    display: flex; gap: 8px; margin-top: 16px;
  }
  .modal-acciones button { flex: 1; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="pantalla-login" class="card">
    <div class="logo">SH Gestión y Servicios</div>
    <h1>Selección de Menús</h1>
    <p class="subtitle">Ingresa tu RUT y PIN para elegir tus menús del mes.</p>
    <label for="rut">RUT</label>
    <input type="text" id="rut" placeholder="12345678-9" autocomplete="username">
    <label for="pin">PIN</label>
    <input type="password" id="pin" placeholder="4 dígitos" maxlength="4" inputmode="numeric" autocomplete="current-password">
    <div id="msg-login"></div>
    <button id="btn-login">Ingresar</button>
  </div>

  <!-- APP -->
  <div id="pantalla-app" class="hidden">
    <div class="card">
      <div class="header-bar">
        <div>
          <div class="logo">SH Gestión</div>
          <div class="user-info" id="user-info"></div>
        </div>
        <button class="btn-secundario btn-pequeno" id="btn-logout">Salir</button>
      </div>
      <h2>Menús del mes <span id="mes-label"></span></h2>
      <p class="subtitle">Tu opción se guarda automáticamente al hacer clic. Puedes cambiar o cancelar hasta 24h antes.</p>
      <div id="msg-app"></div>
      <div class="resumen">
        <div class="resumen-item elegidos">
          <span class="num" id="cnt-elegidos">0</span>
          Elegidos
        </div>
        <div class="resumen-item cancelados">
          <span class="num" id="cnt-cancelados">0</span>
          Cancelados
        </div>
        <div class="resumen-item faltan">
          <span class="num" id="cnt-faltan">0</span>
          Pendientes
        </div>
      </div>
    </div>

    <div id="lista-dias"></div>
  </div>

  <!-- MODAL CANCELACIÓN -->
  <div id="modal-cancelar" class="modal-overlay hidden">
    <div class="modal">
      <h3>¿Cancelar el menú?</h3>
      <p id="modal-fecha-texto"></p>
      <label for="modal-motivo">Motivo de cancelación</label>
      <select id="modal-motivo">
        <option value="">Selecciona un motivo...</option>
        <option value="Viaje">Viaje</option>
        <option value="Licencia médica">Licencia médica</option>
        <option value="Permiso">Permiso</option>
        <option value="Otro">Otro</option>
      </select>
      <input type="text" id="modal-motivo-otro" placeholder="Describe el motivo" class="hidden">
      <div class="modal-acciones">
        <button class="btn-secundario" id="btn-modal-cerrar">Volver</button>
        <button class="btn-rojo" id="btn-modal-confirmar">Confirmar cancelación</button>
      </div>
    </div>
  </div>

</div>

<script>
// =================== CONFIG ===================
const API_URL = 'https://script.google.com/macros/s/AKfycbzjbdUoHmtMx7uLA_UA1N9GKICFND4YcJO4HUpuJnPx0g9YWuILgCCwMRg1a3Tcfb85bg/exec';
// ==============================================

let comensalActual = null;
let menusCache = [];
let seleccionesCache = {};
let diasExpandidos = {};   // { 'YYYY-MM-DD': true } → días que el usuario abrió manualmente
let modalFechaActual = null;

const $ = (id) => document.getElementById(id);

// =================== LOGIN ===================
$('btn-login').addEventListener('click', async () => {
  const rut = $('rut').value.trim();
  const pin = $('pin').value.trim();
  if (!rut || !pin) {
    mostrarMsg('msg-login', 'Ingresa RUT y PIN', 'error');
    return;
  }
  $('btn-login').disabled = true;
  $('btn-login').innerHTML = '<span class="loader"></span>';
  try {
    const r = await apiCall({ accion: 'login', rut, pin });
    if (!r.ok) {
      mostrarMsg('msg-login', r.error || 'Error al ingresar', 'error');
      return;
    }
    comensalActual = r.comensal;
    sessionStorage.setItem('comensal', JSON.stringify(comensalActual));
    await entrarApp();
  } catch (e) {
    mostrarMsg('msg-login', 'Error de conexión: ' + e.message, 'error');
  } finally {
    $('btn-login').disabled = false;
    $('btn-login').innerHTML = 'Ingresar';
  }
});

$('btn-logout').addEventListener('click', () => {
  sessionStorage.removeItem('comensal');
  comensalActual = null;
  diasExpandidos = {};
  $('pantalla-app').classList.add('hidden');
  $('pantalla-login').classList.remove('hidden');
  $('rut').value = '';
  $('pin').value = '';
});

$('pin').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') $('btn-login').click();
});

window.addEventListener('load', () => {
  const s = sessionStorage.getItem('comensal');
  if (s) {
    try {
      comensalActual = JSON.parse(s);
      entrarApp();
    } catch (e) { sessionStorage.removeItem('comensal'); }
  }
});

async function entrarApp() {
  $('pantalla-login').classList.add('hidden');
  $('pantalla-app').classList.remove('hidden');
  $('user-info').textContent = `${comensalActual.nombre} — ${comensalActual.area || ''}`;
  await cargarMenusYSelecciones();
}

async function cargarMenusYSelecciones() {
  try {
    mostrarMsg('msg-app', 'Cargando menús...', 'info');
    const [rMenus, rSel] = await Promise.all([
      apiCall({ accion: 'getMenus' }),
      apiCall({ accion: 'getSelecciones', rut: comensalActual.rut })
    ]);
    if (!rMenus.ok) { mostrarMsg('msg-app', 'No se pudieron cargar los menús', 'error'); return; }
    menusCache = rMenus.menus || [];
    seleccionesCache = (rSel && rSel.ok) ? (rSel.selecciones || {}) : {};
    $('mes-label').textContent = rMenus.mes || '';
    renderDias();
    limpiarMsg('msg-app');
  } catch (e) {
    mostrarMsg('msg-app', 'Error: ' + e.message, 'error');
  }
}

// =================== RENDER ===================

function renderDias() {
  const cont = $('lista-dias');
  cont.innerHTML = '';
  let elegidos = 0, cancelados = 0;
  const total = menusCache.length;

  menusCache.forEach(dia => {
    const seleccion = seleccionesCache[dia.fecha];
    const bloqueado = !puedeModificar(dia.fecha);
    const esCancelado = seleccion && seleccion.estado === 'CANCELADO';
    const esElegido = seleccion && seleccion.estado === 'ACTIVO';

    if (esElegido) elegidos++;
    if (esCancelado) cancelados++;

    let card;
    if (bloqueado) {
      card = renderDiaBloqueado(dia, seleccion);
    } else if (esCancelado) {
      card = renderDiaCancelado(dia, seleccion);
    } else if (esElegido && !diasExpandidos[dia.fecha]) {
      card = renderDiaGuardado(dia, seleccion);
    } else {
      card = renderDiaPendiente(dia, seleccion);
    }
    cont.appendChild(card);
  });

  $('cnt-elegidos').textContent = elegidos;
  $('cnt-cancelados').textContent = cancelados;
  $('cnt-faltan').textContent = total - elegidos - cancelados;
}

// Vista 1: pendiente o expandido para cambiar
function renderDiaPendiente(dia, seleccion) {
  const card = document.createElement('div');
  card.className = 'card dia-card';

  card.innerHTML = `
    <div class="dia-header">
      <div class="dia-fecha-cont">
        <span class="dia-fecha">${formatFecha(dia.fecha)}</span>
        <span class="dia-nombre">${dia.diaSemana}</span>
      </div>
    </div>
    <div class="alternativas"></div>
    ${diasExpandidos[dia.fecha] ? `<div class="dia-acciones">
      <button class="btn-secundario btn-pequeno" data-cancelar-cambio="${dia.fecha}">Cancelar cambio</button>
    </div>` : ''}
  `;

  const altCont = card.querySelector('.alternativas');
  dia.alternativas.forEach(alt => {
    const esSel = seleccion && seleccion.alternativa === alt.codigo && seleccion.estado === 'ACTIVO';
    const op = document.createElement('div');
    op.className = 'alt-opcion' + (esSel ? ' seleccionada' : '');
    op.innerHTML = `
      <div class="alt-radio"></div>
      <div class="alt-info">
        <span class="alt-codigo alt-${alt.codigo}">${alt.codigo} · ${alt.tipo}</span>
        <div class="alt-desc">${alt.descripcion}</div>
      </div>
    `;
    op.addEventListener('click', () => elegir(dia.fecha, alt));
    altCont.appendChild(op);
  });

  // Botón cancelar cambio
  const btnCancelarCambio = card.querySelector('[data-cancelar-cambio]');
  if (btnCancelarCambio) {
    btnCancelarCambio.addEventListener('click', () => {
      delete diasExpandidos[dia.fecha];
      renderDias();
    });
  }

  return card;
}

// Vista 2: guardado y colapsado
function renderDiaGuardado(dia, seleccion) {
  const card = document.createElement('div');
  card.className = 'card dia-card guardado';

  const alt = dia.alternativas.find(a => a.codigo === seleccion.alternativa) || {
    codigo: seleccion.alternativa, tipo: '', descripcion: seleccion.descripcion
  };

  card.innerHTML = `
    <div class="dia-header">
      <div class="dia-fecha-cont">
        <span class="estado-icon ok">✓</span>
        <span class="dia-fecha">${formatFecha(dia.fecha)}</span>
        <span class="dia-nombre">${dia.diaSemana}</span>
      </div>
    </div>
    <div class="vista-colapsada">
      <span class="alt-codigo alt-${alt.codigo}">${alt.codigo} · ${alt.tipo}</span>
      <div class="alt-desc">${alt.descripcion}</div>
    </div>
    <div class="dia-acciones">
      <button class="btn-secundario btn-pequeno" data-cambiar="${dia.fecha}">Cambiar</button>
      <button class="btn-rojo btn-pequeno" data-cancelar="${dia.fecha}">Cancelar pedido</button>
    </div>
  `;

  card.querySelector('[data-cambiar]').addEventListener('click', () => {
    diasExpandidos[dia.fecha] = true;
    renderDias();
  });
  card.querySelector('[data-cancelar]').addEventListener('click', () => {
    abrirModalCancelar(dia.fecha);
  });

  return card;
}

// Vista 3: cancelado (sin reverso)
function renderDiaCancelado(dia, seleccion) {
  const card = document.createElement('div');
  card.className = 'card dia-card cancelado';

  card.innerHTML = `
    <div class="dia-header">
      <div class="dia-fecha-cont">
        <span class="estado-icon x">✕</span>
        <span class="dia-fecha">${formatFecha(dia.fecha)}</span>
        <span class="dia-nombre">${dia.diaSemana}</span>
      </div>
    </div>
    <div class="vista-colapsada">
      <div class="motivo-cancelacion"><strong>Cancelado</strong></div>
      <div class="motivo-cancelacion">Motivo: ${seleccion.motivo || 'No especificado'}</div>
    </div>
  `;

  return card;
}

// Vista 4: bloqueado (menos de 24h)
function renderDiaBloqueado(dia, seleccion) {
  const card = document.createElement('div');
  card.className = 'card dia-card bloqueado';

  let contenido = '';
  if (seleccion && seleccion.estado === 'CANCELADO') {
    contenido = `<div class="vista-colapsada">
      <div class="motivo-cancelacion"><strong>Cancelado</strong></div>
      <div class="motivo-cancelacion">Motivo: ${seleccion.motivo || 'No especificado'}</div>
    </div>`;
  } else if (seleccion && seleccion.estado === 'ACTIVO') {
    const alt = dia.alternativas.find(a => a.codigo === seleccion.alternativa) || {
      codigo: seleccion.alternativa, tipo: '', descripcion: seleccion.descripcion
    };
    contenido = `<div class="vista-colapsada">
      <span class="alt-codigo alt-${alt.codigo}">${alt.codigo} · ${alt.tipo}</span>
      <div class="alt-desc">${alt.descripcion}</div>
    </div>`;
  } else {
    contenido = `<div class="vista-colapsada">
      <div class="motivo-cancelacion">No elegido</div>
    </div>`;
  }

  card.innerHTML = `
    <div class="dia-header">
      <div class="dia-fecha-cont">
        <span class="dia-fecha">${formatFecha(dia.fecha)}</span>
        <span class="dia-nombre">${dia.diaSemana}</span>
        <span class="bloqueado-badge">cerrado</span>
      </div>
    </div>
    ${contenido}
  `;

  return card;
}

// =================== ACCIONES ===================

async function elegir(fecha, alt) {
  try {
    const r = await apiCall({
      accion: 'guardarSeleccion',
      rut: comensalActual.rut,
      fecha,
      alternativa: alt.codigo,
      descripcion: alt.descripcion
    });
    if (!r.ok) { mostrarMsg('msg-app', r.error || 'Error al guardar', 'error'); return; }
    seleccionesCache[fecha] = {
      alternativa: alt.codigo,
      descripcion: alt.descripcion,
      estado: 'ACTIVO',
      motivo: '',
      timestamp: new Date().toISOString()
    };
    delete diasExpandidos[fecha]; // colapsar el día tras guardar
    renderDias();
    mostrarMsg('msg-app', `✓ ${formatFecha(fecha)}: ${alt.descripcion}`, 'ok');
    setTimeout(() => limpiarMsg('msg-app'), 2500);
  } catch (e) {
    mostrarMsg('msg-app', 'Error: ' + e.message, 'error');
  }
}

// =================== MODAL CANCELACIÓN ===================

function abrirModalCancelar(fecha) {
  modalFechaActual = fecha;
  $('modal-fecha-texto').textContent = `Estás a punto de cancelar el menú del ${formatFecha(fecha)}.`;
  $('modal-motivo').value = '';
  $('modal-motivo-otro').value = '';
  $('modal-motivo-otro').classList.add('hidden');
  $('modal-cancelar').classList.remove('hidden');
}

$('modal-motivo').addEventListener('change', () => {
  const v = $('modal-motivo').value;
  if (v === 'Otro') {
    $('modal-motivo-otro').classList.remove('hidden');
    $('modal-motivo-otro').focus();
  } else {
    $('modal-motivo-otro').classList.add('hidden');
  }
});

$('btn-modal-cerrar').addEventListener('click', () => {
  $('modal-cancelar').classList.add('hidden');
  modalFechaActual = null;
});

$('btn-modal-confirmar').addEventListener('click', async () => {
  let motivo = $('modal-motivo').value;
  if (!motivo) {
    alert('Selecciona un motivo de cancelación');
    return;
  }
  if (motivo === 'Otro') {
    const otro = $('modal-motivo-otro').value.trim();
    if (!otro) {
      alert('Describe el motivo');
      $('modal-motivo-otro').focus();
      return;
    }
    motivo = 'Otro: ' + otro;
  }

  const fecha = modalFechaActual;
  $('btn-modal-confirmar').disabled = true;
  $('btn-modal-confirmar').innerHTML = '<span class="loader"></span>';
  try {
    const r = await apiCall({
      accion: 'cancelarSeleccion',
      rut: comensalActual.rut,
      fecha,
      motivo
    });
    if (!r.ok) { alert(r.error || 'Error al cancelar'); return; }
    seleccionesCache[fecha] = {
      alternativa: '', descripcion: '',
      estado: 'CANCELADO',
      motivo: motivo,
      timestamp: new Date().toISOString()
    };
    $('modal-cancelar').classList.add('hidden');
    modalFechaActual = null;
    renderDias();
    mostrarMsg('msg-app', `✕ ${formatFecha(fecha)}: cancelado`, 'ok');
    setTimeout(() => limpiarMsg('msg-app'), 2500);
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    $('btn-modal-confirmar').disabled = false;
    $('btn-modal-confirmar').innerHTML = 'Confirmar cancelación';
  }
});

// =================== UTILS ===================

function puedeModificar(fechaStr) {
  const fechaMenu = new Date(fechaStr + 'T12:00:00');
  const diffHoras = (fechaMenu - new Date()) / (1000 * 60 * 60);
  return diffHoras >= 24;
}

function formatFecha(fechaStr) {
  const [y, m, d] = fechaStr.split('-');
  return `${d}/${m}/${y}`;
}

function mostrarMsg(id, texto, tipo) {
  $(id).innerHTML = `<div class="mensaje ${tipo}">${texto}</div>`;
}
function limpiarMsg(id) { $(id).innerHTML = ''; }

async function apiCall(payload) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  });
  return await r.json();
}
